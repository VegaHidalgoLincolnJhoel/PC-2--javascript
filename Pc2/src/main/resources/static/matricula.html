<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrícula</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/index.html">MiUniversidad</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/index.html">Inicio</a>
                <a class="nav-link" href="/cursos.html">Cursos</a>
                <a class="nav-link active" href="/matricula.html">Matrícula</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h2 class="mb-4">Solicitud de matrícula</h2>
                        <form id="formMatricula">
                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input id="nombre" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Código de estudiante</label>
                                <input id="codigoEstudiante" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Curso</label>
                                <select id="cursoId" class="form-select" required>
                                    <option value="">Cargando cursos...</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Turno</label>
                                <select id="turno" class="form-select" required>
                                    <option value="">Seleccione...</option>
                                    <option value="Mañana">Mañana</option>
                                    <option value="Tarde">Tarde</option>
                                    <option value="Noche">Noche</option>
                                </select>
                            </div>
                            <button class="btn btn-success w-100" type="submit">Enviar solicitud</button>
                        </form>
                        <div id="mensaje" class="alert mt-3 d-none"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function cargarCursos() {
            const select = document.getElementById('cursoId');
            try {
                const respuesta = await fetch('/api/curso');
                const cursos = await respuesta.json();
                select.innerHTML = '<option value="">Seleccione un curso...</option>';

                cursos.filter(curso => curso.vacantes > 0).forEach(curso => {
                    const option = document.createElement('option');
                    option.value = curso.id;
                    option.textContent = `${curso.nombre} (${curso.vacantes} vacantes)`;
                    select.appendChild(option);
                });
            } catch (error) {
                select.innerHTML = '<option value="">No se pudieron cargar los cursos</option>';
            }
        }

        function mostrarMensaje(texto, tipo) {
            const div = document.getElementById('mensaje');
            div.className = `alert alert-${tipo} mt-3`;
            div.textContent = texto;
            div.classList.remove('d-none');
        }

        document.getElementById('formMatricula').addEventListener('submit', async (event) => {
            event.preventDefault();

            const payload = {
                nombre: document.getElementById('nombre').value,
                codigoEstudiante: document.getElementById('codigoEstudiante').value,
                cursoId: Number(document.getElementById('cursoId').value),
                turno: document.getElementById('turno').value
            };

            try {
                const respuesta = await fetch('/api/matriculas', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (respuesta.ok || respuesta.status === 201) {
                    mostrarMensaje('Solicitud de matrícula enviada correctamente.', 'success');
                    event.target.reset();
                } else {
                    mostrarMensaje('No se pudo procesar la matrícula.', 'danger');
                }
            } catch (error) {
                mostrarMensaje('No se pudo conectar con la API.', 'danger');
            }
        });

        document.addEventListener('DOMContentLoaded', cargarCursos);
    </script>
</body>
</html>
